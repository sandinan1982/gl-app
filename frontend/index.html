<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplikasi GL - General Ledger Multi Cabang</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="loginScreen" class="login-wrap">
  <form id="loginForm" class="login-box">
    <h1>GL App</h1>
    <p class="sub">General Ledger Multi Cabang</p>
    <div id="loginError" class="error-msg" style="display:none;"></div>
    <label>Username</label>
    <input type="text" id="loginUsername" required autocomplete="username">
    <label>Password</label>
    <input type="password" id="loginPassword" required autocomplete="current-password">
    <button type="submit">Masuk</button>
    <p class="hint">Default: admin / admin123</p>
  </form>
</div>

<!-- ==================== MAIN APP ==================== -->
<div id="appScreen" class="app-wrap" style="display:none;">
  <aside class="sidebar">
    <div class="brand">GL App</div>
    <div id="branchSwitcherWrap" class="branch-switcher"></div>
    <nav id="menuNav"></nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div id="pageTitle">Dashboard</div>
      <div class="userinfo">
        <span id="userLabel"></span>
        <button id="logoutBtn">Keluar</button>
      </div>
    </header>
    <div id="content" class="content"></div>
  </main>
</div>

<script src="js/app.js"></script>
</body>
</html>
